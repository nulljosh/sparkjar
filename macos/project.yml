name: SparkMac
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    macOS: "14.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  SparkMac:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "icon.svg"
          - "architecture.svg"
          - ".asc"
          - "fastlane"
          - "ExportOptions.plist"
    settings:
      INFOPLIST_FILE: ""
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.spark.mac
      GENERATE_INFOPLIST_FILE: YES
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_STYLE: Automatic
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    entitlements:
      path: SparkMac.entitlements
    dependencies:
      - target: SparkWidgets

  SparkWidgets:
    type: app-extension
    platform: macOS
    sources:
      - path: ../widgets-macos
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.spark.mac.widgets
      GENERATE_INFOPLIST_FILE: YES
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      CODE_SIGN_STYLE: Automatic
      INFOPLIST_KEY_CFBundleDisplayName: Spark Widgets
      INFOPLIST_KEY_NSHumanReadableCopyright: ""
      INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
      LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
    entitlements:
      path: SparkWidgets.entitlements
