name: Spark
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "2.1.0"
  CURRENT_PROJECT_VERSION: "2"
targets:
  Spark:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - "SparkTests"
          - "scripts"
          - "icon.svg"
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.spark
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  SparkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SparkTests
    dependencies:
      - target: Spark
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.spark.tests
      GENERATE_INFOPLIST_FILE: YES
