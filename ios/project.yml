name: Spark
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    iOS: "17.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "2.1.1"
  CURRENT_PROJECT_VERSION: "2"
targets:
  Spark:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
          - "CLAUDE.md"
          - "architecture.svg"
          - "SparkTests"
          - "scripts"
          - "icon.svg"
          - "fastlane"
          - ".asc"
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.spark
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: Spark.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jt.spark
    dependencies:
      - target: SparkWidgetsExtension
  SparkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SparkTests
    dependencies:
      - target: Spark
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.spark.tests
      GENERATE_INFOPLIST_FILE: YES
  SparkWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ../widgets-ios
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - "*.md"
          - "*.svg"
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Spark Widgets
      INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 Joshua Trommel"
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.spark.widgets
      ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
      PRODUCT_NAME: SparkWidgets
      CODE_SIGN_STYLE: Automatic
    entitlements:
      path: ../widgets-ios/SparkWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jt.spark
