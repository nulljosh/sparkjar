<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a1a" rx="32"/>
  <!-- Glass panel -->
  <rect x="48" y="26" width="104" height="148" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Lightbulb glass dome -->
  <circle cx="100" cy="82" r="30" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
  <!-- Inner glow ring -->
  <circle cx="100" cy="82" r="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <!-- Filament lines -->
  <path d="M92,88 Q96,72 100,88" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1" stroke-linecap="round"/>
  <path d="M100,88 Q104,72 108,88" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1" stroke-linecap="round"/>
  <!-- Filament center point -->
  <circle cx="100" cy="76" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <!-- Bulb base segments -->
  <rect x="88" y="112" width="24" height="5" rx="2.5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <rect x="90" y="119" width="20" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
  <rect x="93" y="125" width="14" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <!-- Spark rays -->
  <line x1="100" y1="40" x2="100" y2="32" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="127" y1="56" x2="133" y2="50" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="73" y1="56" x2="67" y2="50" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="136" y1="82" x2="142" y2="82" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="64" y1="82" x2="58" y2="82" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small spark dots -->
  <circle cx="135" cy="48" r="1.2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="65" cy="48" r="1.2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="144" cy="74" r="1" fill="rgba(255,255,255,0.12)"/>
  <circle cx="56" cy="74" r="1" fill="rgba(255,255,255,0.12)"/>
  <!-- Bottom label bar -->
  <rect x="72" y="148" width="56" height="3" rx="1.5" fill="rgba(255,255,255,0.08)"/>
  <rect x="84" y="155" width="32" height="3" rx="1.5" fill="rgba(255,255,255,0.05)"/>
</svg>