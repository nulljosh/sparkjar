name: SparkWatch
options:
  bundleIdPrefix: com.heyitsmejosh
  deploymentTarget:
    watchOS: "10.0"
settings:
  DEVELOPMENT_TEAM: QMM486NPYC
  SWIFT_VERSION: "6.0"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  SparkWatch:
    type: application
    platform: watchOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.yml"
          - ".git"
          - ".gitignore"
          - "README.md"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.spark.watchos
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      INFOPLIST_FILE: ""
      GENERATE_INFOPLIST_FILE: YES
